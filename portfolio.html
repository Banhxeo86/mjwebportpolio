<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹앱 포트폴리오</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Pastel & Professional Palette (Muted Blues/Greens) */
            --bg: #f9fbff;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent: #5dade2; /* Soft Professional Blue */
            --accent-soft: #ebf5fb;
            --border: #eef2f7;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* --- Header --- */
        header {
            position: relative;
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 24px;
        }

        .header-content h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Author Badge: Subdued, informative look */
        .author-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
            cursor: default;
        }

        /* Contact Button: Elevated, actionable look */
        .contact-btn {
            background: var(--text-main);
            color: #fff;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .contact-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(93, 173, 226, 0.3);
        }

        /* --- Category Section --- */
        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            padding-left: 4px;
        }

        .category-title i {
            color: var(--accent);
            width: 22px;
            height: 22px;
        }

        /* --- Horizontal Slider --- */
        .slider-wrapper {
            position: relative;
            margin: 0 -24px;
            padding: 0 24px;
        }

        .slider-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            padding: 10px 0 30px;
        }

        .slider-container::-webkit-scrollbar {
            display: none;
        }

        /* --- Card --- */
        .project-card {
            flex: 0 0 320px;
            scroll-snap-align: start;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: var(--shadow);
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .icon-box {
            width: 44px;
            height: 44px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .project-card p {
            font-size: 14px;
            color: var(--text-sub);
            height: 63px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .go-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .project-card:hover .go-btn {
            background: var(--accent);
            color: #fff;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            color: var(--text-sub);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            header { flex-direction: column-reverse; align-items: flex-start; gap: 20px; }
            .header-content h1 { font-size: 32px; }
            .project-card { flex: 0 0 280px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>Web App Collection</h1>
            </div>
            <div class="header-actions">
                <div class="author-badge">
                    <i data-lucide="user" style="width:14px;height:14px"></i>
                    제작자: 명진
                </div>
                <a href="https://open.kakao.com/o/p6phjJri" target="_blank" class="contact-btn">
                    <i data-lucide="message-circle" style="width:16px;height:16px"></i>
                    문의하기
                </a>
            </div>
        </header>

        <main id="main-content">
            <!-- Categories and Sliders will be injected here -->
        </main>

        <footer>
            <p>© 2026 AI-ON 교과연구회. All rights reserved.</p>
        </footer>
    </div>

    <!-- 데이터 로드 (메모장에서 수정 가능한 파일) -->
    <script src="data.js"></script>

    <script>
        function renderPortfolio() {
            const main = document.getElementById('main-content');
            
            // 데이터 파일 로드 확인
            if (typeof projects === 'undefined') {
                main.innerHTML = '<p style="text-align:center; padding: 50px; color: var(--text-sub);">데이터 파일(data.js)을 불러오지 못했습니다.</p>';
                return;
            }
            
            main.innerHTML = '';

            projects.forEach(group => {
                const section = document.createElement('section');
                section.className = 'category-section';

                section.innerHTML = `
                    <h2 class="category-title">
                        <i data-lucide="${group.icon}"></i>
                        ${group.category}
                    </h2>
                    <div class="slider-wrapper">
                        <div class="slider-container">
                            ${group.items.map(item => `
                                <a href="${item.link}" class="project-card">
                                    <div class="icon-box">
                                        <i data-lucide="${item.icon}"></i>
                                    </div>
                                    <h3>${item.title}</h3>
                                    <p>${item.description}</p>
                                    <div class="card-footer">
                                        <span>실행하기</span>
                                        <div class="go-btn">
                                            <i data-lucide="chevron-right" style="width:16px;height:16px"></i>
                                        </div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;

                main.appendChild(section);
            });

            // Lucide 아이콘 초기화
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', renderPortfolio);
    </script>
</body>
</html>

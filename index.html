<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹앱 포트폴리오</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f9fbff;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent: #5dade2;
            --accent-soft: #ebf5fb;
            --border: #eef2f7;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 24px;
        }

        .header-content h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header-actions { display: flex; align-items: center; gap: 8px; }

        .header-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: 100px;
            font-size: 13px; font-weight: 600;
            text-decoration: none; transition: all 0.3s ease;
        }

        .career-btn { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
        .contact-btn { background: var(--text-main); color: #fff; }

        /* --- Category & Slider --- */
        .category-section { margin-bottom: 60px; position: relative; }
        .category-title {
            font-size: 20px; font-weight: 700; margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px;
        }

        /* Slider Wrapper */
        .slider-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .slider-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 10px 0;
            width: 100%;
        }

        .slider-container::-webkit-scrollbar { display: none; }

        /* Slider Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .nav-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .prev-btn { left: -20px; }
        .next-btn { right: -20px; }

        /* --- Card --- */
        .project-card {
            flex: 0 0 320px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: var(--shadow);
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent);
        }

        .icon-box {
            width: 44px; height: 44px;
            background: var(--accent-soft); color: var(--accent);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }

        .project-card p {
            font-size: 14px; color: var(--text-sub);
            height: 63px; overflow: hidden; line-height: 1.6;
        }

        .card-footer {
            margin-top: auto; display: flex; align-items: center;
            justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--accent);
        }

        .go-btn {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
        }

        footer { text-align: center; margin-top: 60px; padding: 40px 0; border-top: 1px solid var(--border); color: var(--text-sub); font-size: 13px; }

        @media (max-width: 600px) {
            .nav-btn { display: none; } /* 모바일에서는 버튼 숨김 (터치 스크롤) */
            .project-card { flex: 0 0 280px; }
            .header-content h1 { font-size: 28px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content"><h1>Web App Collection</h1></div>
            <div class="header-actions">
                <a href="career.html" class="header-pill career-btn"><i data-lucide="briefcase" style="width:14px;height:14px"></i>개발자 경력</a>
                <a href="https://open.kakao.com/o/p6phjJri" target="_blank" class="header-pill contact-btn"><i data-lucide="message-circle" style="width:14px;height:14px"></i>문의하기</a>
            </div>
        </header>

        <main id="main-content"></main>

        <footer><p>© 2026 AI-ON 교과연구회. All rights reserved.</p></footer>
    </div>

    <script src="data.js"></script>
    <script>
        function renderPortfolio() {
            const main = document.getElementById('main-content');
            if (typeof projects === 'undefined') {
                main.innerHTML = '<p style="text-align:center; padding: 50px;">데이터를 불러올 수 없습니다.</p>';
                return;
            }

            main.innerHTML = '';

            projects.forEach((group, index) => {
                const section = document.createElement('section');
                section.className = 'category-section';

                section.innerHTML = `
                    <h2 class="category-title"><i data-lucide="${group.icon}"></i>${group.category}</h2>
                    <div class="slider-wrapper">
                        <button class="nav-btn prev-btn" onclick="moveSlider(${index}, -1)"><i data-lucide="chevron-left"></i></button>
                        <div class="slider-container" id="slider-${index}">
                            ${group.items.map(item => `
                                <a href="${item.link}" class="project-card" target="_blank">
                                    <div class="icon-box"><i data-lucide="${item.icon}"></i></div>
                                    <h3>${item.title}</h3>
                                    <p>${item.description}</p>
                                    <div class="card-footer">
                                        <span>실행하기</span>
                                        <div class="go-btn"><i data-lucide="chevron-right" style="width:16px;height:16px"></i></div>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                        <button class="nav-btn next-btn" onclick="moveSlider(${index}, 1)"><i data-lucide="chevron-right"></i></button>
                    </div>
                `;
                main.appendChild(section);
            });
            lucide.createIcons();
        }

        // 무한 루프 슬라이더 로직
        function moveSlider(index, direction) {
            const slider = document.getElementById(`slider-${index}`);
            const cards = slider.querySelectorAll('.project-card');
            const cardWidth = cards[0].offsetWidth + 20; // 카드 너비 + gap
            
            const currentScroll = slider.scrollLeft;
            const maxScroll = slider.scrollWidth - slider.clientWidth;

            if (direction === 1) { // 오른쪽 클릭
                if (currentScroll >= maxScroll - 5) { // 끝에 도달하면 처음으로
                    slider.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    slider.scrollBy({ left: cardWidth, behavior: 'smooth' });
                }
            } else { // 왼쪽 클릭
                if (currentScroll <= 5) { // 처음에 도달하면 끝으로
                    slider.scrollTo({ left: maxScroll, behavior: 'smooth' });
                } else {
                    slider.scrollBy({ left: -cardWidth, behavior: 'smooth' });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', renderPortfolio);
    </script>
</body>
</html>
